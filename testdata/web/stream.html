<!DOCTYPE html>
<html>
<head>
    <title>{{title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-100">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">{{title}}</h1>

        <div class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-400">
            <h2 class="text-xl font-semibold text-blue-800">Streaming Content</h2>
            <p class="text-blue-700">This content loads with streaming. Ready: {{ready}}</p>
        </div>

        <div class="text-sm text-gray-500">
            <p>Page rendered with streaming at: {{now}}</p>
            <p>App: {{appName}} v{{appVersion}}</p>
            <p>Database: {{dbDriver}}</p>
        </div>
    </div>
</body>
</html>
